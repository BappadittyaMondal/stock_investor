[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Unit tests (no DB, no network)
    integration: Integration tests (real SQLite test DB)
    slow: Tests that may take > 5s
