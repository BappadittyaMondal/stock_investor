<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HFOS - Offline Mode</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 400px; border: 1px solid #334155; }
        h1 { color: #38bdf8; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
    </style>
</head>
<body>
    <h1>HFOS Offline Mode</h1>
    <p>You are currently not connected to the internet. Displaying cached data.</p>
    
    <div class="card">
        <h3>Last Sync Data</h3>
        <div class="data-row"><span>Portfolio Snapshot:</span> <span id="pf-sync">Available</span></div>
        <div class="data-row"><span>Watchlists:</span> <span id="wl-sync">Cached</span></div>
        <div class="data-row"><span>Top Signals:</span> <span id="sig-sync">Available</span></div>
    </div>
    
    <p style="color: #94a3b8; font-size: 0.8rem;">HFOS Service Worker will resume live polling once connectivity is restored.</p>
</body>
</html>
